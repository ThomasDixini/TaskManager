<div class="board">
  <div class="board__columns" cdkDropListGroup>
    @for (column of columns; track column.id) {
      <div class="board-column">
        <div class="board-column__header">
          <span class="board-column__title">{{ column.label }}</span>
          <span class="board-column__count">{{ tasksFor(column.id).length }}</span>
        </div>
        <div class="board-column__hint">{{ column.hint }}</div>

        <div
          class="board-column__list"
          cdkDropList
          [id]="column.id"
          [cdkDropListData]="tasksFor(column.id)"
          (cdkDropListDropped)="onDrop($event)"
        >
          @for (task of tasksFor(column.id); track task.id) {
            <div class="board-column__item" cdkDrag [cdkDragData]="task">
              <app-task-card
                [task]="task"
                [projectName]="projectNameFor(task)"
                [labels]="labelsFor(task)"
                (cardClick)="openEditor($event)"
              ></app-task-card>
            </div>
          }
        </div>

        <div class="board-column__quick-add">
          <mat-form-field appearance="outline" class="board-column__quick-add-field">
            <textarea
              matInput
              rows="1"
              placeholder="Add a task..."
              [ngModel]="quickAddTitleFor(column.id)"
              (ngModelChange)="setQuickAddTitle(column.id, $event)"
              (keydown.enter)="onQuickAddKeydown($event, column.id)"
              (keydown.escape)="cancelQuickAdd(column.id)"
            ></textarea>
          </mat-form-field>
          <button mat-icon-button color="primary" (click)="onQuickAddSubmit(column.id)" aria-label="Add task">
            +
          </button>
        </div>
      </div>
    }
  </div>
</div>
